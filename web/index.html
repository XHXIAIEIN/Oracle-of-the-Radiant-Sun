<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="color-scheme" content="dark" />
		<meta name="theme-color" content="#12131f" />
		<meta name="format-detection" content="telephone=no,email=no,address=no" />
		<title>Oracle of the Radiant Sun</title>
		<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E☀%3C/text%3E%3C/svg%3E" />
		<!-- every sitting needs all four — fetch them before the module graph asks -->
		<link rel="preload" href="data/lang/en.json" as="fetch" />
		<link rel="preload" href="data/lang/zh.json" as="fetch" />
		<link rel="preload" href="data/deck.json" as="fetch" />
		<link rel="preload" href="data/catalog.json" as="fetch" />
		<!-- one file per component: tokens and base first, screens, then motion and press feedback last -->
		<link rel="stylesheet" href="css/tokens.css" />
		<link rel="stylesheet" href="css/base.css" />
		<link rel="stylesheet" href="css/shared.css" />
		<link rel="stylesheet" href="css/home.css" />
		<link rel="stylesheet" href="css/ritual.css" />
		<link rel="stylesheet" href="css/wheel.css" />
		<link rel="stylesheet" href="css/cards.css" />
		<link rel="stylesheet" href="css/setup.css" />
		<link rel="stylesheet" href="css/panel.css" />
		<link rel="stylesheet" href="css/library.css" />
		<link rel="stylesheet" href="css/dialog.css" />
		<link rel="stylesheet" href="css/motion.css" />
		<link rel="stylesheet" href="css/press.css" />
	</head>
	<body>
		<!-- p5 ambient sky: stars + slow radiant halo -->
		<div id="bg" aria-hidden="true"></div>
		<div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

		<div class="top-capsules" id="top-capsules">
			<div class="language-switch" id="language-switch">
				<button class="global-lang" id="global-lang" type="button" aria-label="Switch language" aria-expanded="false" aria-controls="language-menu">中</button>
				<div class="language-menu" id="language-menu" role="menu" hidden>
					<button type="button" role="menuitemradio" data-lang-option="en" aria-checked="true">English</button>
					<button type="button" role="menuitemradio" data-lang-option="zh" aria-checked="false">中文</button>
				</div>
			</div>
		</div>

		<!-- ══════════════ Screen: home / choose a reading ══════════════ -->
		<section class="screen screen--home" id="screen-home">
			<a class="github-link" href="https://github.com/XHXIAIEIN/Oracle-of-the-Radiant-Sun" target="_blank" rel="noopener noreferrer" aria-label="Open GitHub repository" title="GitHub repository">
				<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
					<path d="M12 1.9c-5.6 0-10.1 4.5-10.1 10.1 0 4.5 2.9 8.3 6.9 9.6.5.1.7-.2.7-.5v-1.9c-2.8.6-3.4-1.2-3.4-1.2-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 .1 1.6 1 1.6 1 .9 1.6 2.5 1.1 3.1.9.1-.7.4-1.1.7-1.4-2.3-.3-4.7-1.1-4.7-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.8 1 .8-.2 1.6-.3 2.5-.3s1.7.1 2.5.3c1.9-1.3 2.8-1 2.8-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.4 4.8-4.7 5 .4.3.7.9.7 1.8v2.7c0 .3.2.6.7.5 4-1.3 6.9-5.1 6.9-9.6 0-5.6-4.5-10.1-10.1-10.1z" />
				</svg>
			</a>
			<header class="masthead">
				<div class="masthead__sun" aria-hidden="true">☉</div>
				<h1 class="masthead__title">Oracle of the Radiant Sun</h1>
				<p class="masthead__sub lang-copy" data-i18n="app.subtitle">Astrology Cards to Illuminate Your Life</p>
			</header>

			<p class="home-intro immersive-copy" data-i18n="home.intro"></p>

			<nav class="methods" id="methods" aria-label="Choose a reading" data-i18n-aria="home.methodsAria"></nav>

			<button class="lib-open lang-copy" id="btn-library" type="button" data-i18n="home.libraryOpen">Open the complete deck · 84 cards</button>

			<footer class="home-foot">Astrology Cards to Illuminate Your Life</footer>
		</section>

		<!-- ══════════════ Screen: ritual ══════════════ -->
		<section class="screen screen--ritual" id="screen-ritual" hidden>
			<header class="ritual-head">
				<button class="ghost-btn lang-copy" id="btn-home" type="button" data-i18n="nav.backHomeHtml" data-i18n-html="true">←<span class="label-long"> Back to Home</span><span class="label-short"> Back</span></button>
				<h2 class="ritual-head__title" id="ritual-title"></h2>
				<div class="ritual-head__tools" id="ritual-tools"></div>
				<span class="deck-badge" id="deck-badge" hidden>
					<span class="lang-copy" data-i18n="ritual.deck">Deck</span>
					<b id="deck-count">71</b>
				</span>
				<button class="share-btn lang-copy" id="btn-share" type="button" hidden data-i18n="ritual.share">Copy Link</button>
			</header>

			<div class="ritual-body" id="ritual-body">
				<div class="stage-wrap">
					<!-- horary setup panel lives above the wheel until shuffling begins -->
					<div class="setup" id="setup" hidden></div>
					<!-- the horary question, inscribed above the wheel for the whole sitting -->
					<p class="question-line" id="question-line" hidden></p>
					<div class="wheel" id="wheel"></div>
					<!-- one quiet instruction line at a time, beneath the wheel -->
					<p class="rite-line" id="rite-line" aria-live="polite"></p>
					<div class="stage-actions" id="stage-actions"></div>
					<button class="analysis-pill panel-rise-btn act-btn act-btn--quiet lang-copy" id="analysis-pill" type="button" hidden data-i18n="ritual.analysisOpen" aria-controls="panel">Analysis</button>
				</div>
				<aside class="panel" id="panel" hidden>
					<!-- the drawer's grip: drag between peek / half / full, tap to toggle -->
						<button class="panel__grip" id="panel-grip" type="button" aria-label="Drag or tap to collapse or expand the reading"></button>
					<div class="panel__head">
						<h3 class="panel__title" id="panel-title"></h3>
						<button class="panel__sort lang-copy" id="panel-sort" type="button" data-i18n="ritual.panelSortOldest">Oldest First</button>
					</div>
					<div class="panel__list" id="panel-list"></div>
					<button class="panel__jump" id="panel-jump" type="button" hidden>
						<span class="arrow">↓</span>
						<span class="lang-copy" data-i18n="ritual.jumpLatest">Jump to Latest</span>
					</button>
				</aside>
			</div>
		</section>

		<!-- ══════════════ Screen: card library ══════════════ -->
		<section class="screen screen--library" id="screen-library" hidden>
			<header class="ritual-head">
				<button class="ghost-btn lang-copy" id="btn-lib-home" type="button" data-i18n="nav.backHomeHtml" data-i18n-html="true">←<span class="label-long"> Back to Home</span><span class="label-short"> Back</span></button>
				<h2 class="ritual-head__title lang-copy" data-i18n="library.title">The Complete Deck</h2>
				<div class="ritual-head__tools" id="library-tools"></div>
				<span class="deck-badge" id="lib-count">
					<b>84</b>
					<span class="lang-copy" data-i18n="library.countSuffix">/ 84 cards</span>
				</span>
			</header>
			<div class="lib-filters" id="lib-filters"></div>
			<div class="lib-secs" id="lib-secs"></div>
		</section>

		<!-- ══════════════ Card detail dialog ══════════════ -->
		<dialog class="card-dialog" id="card-dialog">
			<!-- bottom-sheet grabber: drag down to dismiss (phones only) -->
			<div class="card-dialog__grab" id="dialog-grab" aria-hidden="true"></div>
			<button class="card-dialog__close" id="dialog-close" type="button" aria-label="Close" data-i18n-aria="dialog.close">✕</button>
			<!-- leaf through a row of cards (a week's days …) without leaving the dialog -->
			<button class="card-dialog__nav card-dialog__nav--prev" id="dialog-prev" type="button" aria-label="Previous card" data-i18n-aria="dialog.prev" hidden>‹</button>
			<button class="card-dialog__nav card-dialog__nav--next" id="dialog-next" type="button" aria-label="Next card" data-i18n-aria="dialog.next" hidden>›</button>
			<div class="card-dialog__grid" id="dialog-body"></div>
		</dialog>

		<!-- full-size card art, opened by tapping the art in the detail dialog -->
		<dialog class="zoom-dialog" id="zoom-dialog">
			<img id="zoom-img" alt="" />
		</dialog>

		<script defer src="vendor/gsap.min.js"></script>
		<script defer src="js/sketch.js"></script>
		<script type="module" src="js/main.js"></script>
	</body>
</html>
